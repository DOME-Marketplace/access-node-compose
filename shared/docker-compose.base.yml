# Base Docker Compose configuration for DOME Access Node
# Shared across all environments (local, staging, production)
x-common-options: &common-options
  logging:
    driver: "json-file"
    options:
      max-file: "5"
      max-size: "10m"
  restart: unless-stopped
  stdin_open: true
  tty: true


services:
  # PostgreSQL with PostGIS for Scorpio Context Broker
  scorpio-db:
    image: postgis/postgis:14-3.3
    restart: unless-stopped
    networks:
      default:
        aliases:
          - scorpio-db
    environment:
      POSTGRES_DB: ${SCORPIO_DB_NAME:-scorpio}
      POSTGRES_USER: ${SCORPIO_DB_USER:-scorpio}
      POSTGRES_PASSWORD: ${SCORPIO_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SCORPIO_DB_USER:-scorpio}"]
      interval: 10s
      timeout: 5s
      retries: 5
    <<: *common-options

  # Scorpio Context Broker (NGSI-LD)
  scorpio:
    # Official Scorpio NGSI-LD Context Broker
    # Using java-only version (no Kafka) for resource efficiency
    image: ${SCORPIO_IMAGE:-scorpiobroker/all-in-one-runner:java-4.1.11}
    restart: unless-stopped
    networks:
      default:
        aliases:
          - scorpio
    depends_on:
      scorpio-db:
        condition: service_healthy
    environment:
      DBHOST: scorpio-db
      DBNAME: ${SCORPIO_DB_NAME:-scorpio}
      DBUSER: ${SCORPIO_DB_USER:-scorpio}
      DBPASS: ${SCORPIO_DB_PASSWORD}
      SCORPIO_TOPICS_ENTITY: entity
      SCORPIO_TOPICS_ENTITYBATCH: entitybatch
      SCORPIO_TOPICS_REGISTRY: registry
      SCORPIO_TOPICS_TEMPORAL: temporal
    healthcheck:
      test: ["CMD-SHELL", "perl -e 'use Socket; socket(S, PF_INET, SOCK_STREAM, getprotobyname(\"tcp\")); connect(S, sockaddr_in(9090, inet_aton(\"127.0.0.1\"))) && exit 0 || exit 1'"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    <<: *common-options

  # PostgreSQL for Desmos audit database
  desmos-db:
    image: postgres:14
    restart: unless-stopped
    networks:
      default:
        aliases:
          - desmos-db
    environment:
      POSTGRES_DB: ${DESMOS_DB_NAME:-desmos}
      POSTGRES_USER: ${DESMOS_DB_USER:-desmos}
      POSTGRES_PASSWORD: ${DESMOS_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DESMOS_DB_USER:-desmos}"]
      interval: 10s
      timeout: 5s
      retries: 5
    <<: *common-options

  # Desmos - Replication Service
  desmos:
    # Official DOME Desmos image from Docker Hub
    image: ${DESMOS_IMAGE:-in2workspace/in2-desmos-api:v2.0.2}
    restart: unless-stopped
    networks:
      default:
        aliases:
          - desmos
    depends_on:
      scorpio:
        condition: service_healthy
      desmos-db:
        condition: service_healthy
      dlt-adapter:
        condition: service_started
    environment:
      # Database configuration (R2DBC for reactive support)
      SPRING_R2DBC_URL: r2dbc:postgresql://desmos-db:5432/${DESMOS_DB_NAME:-desmos}
      SPRING_R2DBC_USERNAME: ${DESMOS_DB_USER:-desmos}
      SPRING_R2DBC_PASSWORD: ${DESMOS_DB_PASSWORD}

      # Flyway configuration (JDBC for migrations - separate from R2DBC)
      SPRING_FLYWAY_URL: jdbc:postgresql://desmos-db:5432/${DESMOS_DB_NAME:-desmos}
      SPRING_FLYWAY_LOCATIONS: classpath:db/migration
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_DEFAULT_SCHEMA: desmos

      # Operator configuration
      OPERATOR_ORGANIZATIONIDENTIFIER: ${ORGANIZATION_DID}

      # API Configuration
      API_EXTERNALDOMAIN: ${EXTERNAL_DOMAIN_PROTOCOL:-http}://${EXTERNAL_DOMAIN}
      API_VERSION: v2

      # Context Broker Configuration
      BROKER_PROVIDER: scorpio
      BROKER_INTERNALDOMAIN: http://scorpio:9090
      BROKER_PATHS_ENTITIES: /ngsi-ld/v1/entities
      BROKER_PATHS_ENTITYOPERATIONS: /ngsi-ld/v1/entityOperations
      BROKER_PATHS_SUBSCRIPTIONS: /ngsi-ld/v1/subscriptions
      BROKER_PATHS_TEMPORAL: /ngsi-ld/v1/temporal/entities

      # NGSI Subscription
      NGSI-SUBSCRIPTION_NOTIFICATIONENDPOINT: http://desmos:8080/api/v2/notifications/broker

      # DLT Adapter Configuration
      DLT-ADAPTER_PROVIDER: digitelts
      DLT-ADAPTER_INTERNALDOMAIN: http://dlt-adapter:8080
      DLT-ADAPTER_EXTERNALDOMAIN: ${EXTERNAL_DOMAIN_PROTOCOL:-http}://localhost:8082
      DLT-ADAPTER_PATHS_PUBLICATION: /api/v1/publishEvent
      DLT-ADAPTER_PATHS_SUBSCRIPTION: /api/v1/subscribe
      DLT-ADAPTER_PATHS_EVENTS: /api/v1/events

      # TX Subscription
      TX-SUBSCRIPTION_NOTIFICATIONENDPOINT: http://desmos:8080/api/v2/notifications/dlt

      # Security
      SECURITY_PRIVATEKEY: ${DESMOS_PRIVATE_KEY}
      SECURITY_LEARCREDENTIALMACHINEINBASE64: ${LEAR_CREDENTIAL}

      # Access Node
      ACCESS-NODE_TRUSTEDACCESSNODESLIST: https://raw.githubusercontent.com/DOME-Marketplace/trust-framework/refs/heads/main/sbx/trusted_access_nodes_list.yaml

      # External Access Nodes
      EXTERNAL-ACCESS-NODES_URLS: ""

      # Verifier
      VERIFIER_URL: https://verifier.dome-marketplace-sbx.org

      # Profile (dev/test/prod)
      SPRING_PROFILES_ACTIVE: ${DESMOS_PROFILE:-dev}

      # Logging
      LOGGING_LEVEL_ROOT: ${DESMOS_LOG_LEVEL:-INFO}
      LOGGING_LEVEL_ES_IN2_DESMOS: ${DESMOS_LOG_LEVEL:-INFO}
    <<: *common-options

  # DLT-Adapter - Blockchain Interface
  dlt-adapter:
    # Official DOME DLT-Adapter image from Quay.io
    image: ${DLT_ADAPTER_IMAGE:-quay.io/digitelts/dlt-adapter:1.5.1}
    restart: unless-stopped
    networks:
      default:
        aliases:
          - dlt-adapter
    environment:
      # Ethereum private key (for signing transactions)
      PRIVATE_KEY: ${DLT_PRIVATE_KEY}

      # Ethereum address
      ADDRESS: ${DLT_ADDRESS}

      # ISS (SHA-256 organization identifier)
      ISS: ${DLT_ISS}

      # Alastria RPC endpoint
      RPC_ENDPOINT: ${ALASTRIA_RPC_ENDPOINT:-https://rpc.alastria.io}

      # Polling configuration
      POLLING_INTERVAL: ${DLT_POLLING_INTERVAL:-10000}
      POLLING_BLOCK_RANGE: ${DLT_POLLING_BLOCK_RANGE:-100}

      # Desmos callback URL
      DESMOS_CALLBACK_URL: http://desmos:8080/api/v1/blockchain/events

      # Logging
      LOG_LEVEL: ${DLT_LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    <<: *common-options

  # Redis (for caching)
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      default:
        aliases:
          - redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    <<: *common-options

  # ============================================================================
  # TMForum API Layer - Marketplace APIs
  # ============================================================================

  # TMF620 - Product Catalog Management
  tmforum-product-catalog:
    image: ${TMFORUM_PRODUCT_CATALOG_IMAGE:-quay.io/fiware/tmforum-product-catalog:0.25.1}
    restart: unless-stopped
    networks:
      default:
        aliases:
          - tmforum-product-catalog
    depends_on:
      scorpio:
        condition: service_healthy
    environment:
      MICRONAUT_SERVER_PORT: 8080
      ENDPOINTS_ALL_PORT: 9090
      MICRONAUT_METRICS_ENABLED: "true"
      ENDPOINTS_HEALTH_ENABLED: "true"
      LOGGER_LEVELS_ROOT: ${TMFORUM_LOG_LEVEL:-INFO}
      MICRONAUT_HTTP_SERVICES_NGSI_URL: http://scorpio:9090
      MICRONAUT_HTTP_SERVICES_NGSI_PATH: ngsi-ld/v1
      GENERAL_BASEPATH: /tmf-api/productCatalogManagement/v4
      GENERAL_CONTEXT_URL: https://uri.etsi.org/ngsi-ld/v1/ngsi-ld-core-context.jsonld
      GENERAL_SERVER_HOST: ${EXTERNAL_DOMAIN_PROTOCOL:-https}://${EXTERNAL_DOMAIN}
      MAPPING_STRICT_RELATIONSHIPS: "false"
      API_EXTENSION_ENABLED: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9090/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    <<: *common-options

  # TMF632 - Party Management (Organizations & Individuals)
  tmforum-party-catalog:
    image: ${TMFORUM_PARTY_CATALOG_IMAGE:-quay.io/fiware/tmforum-party-catalog:0.25.1}
    restart: unless-stopped
    networks:
      default:
        aliases:
          - tmforum-party-catalog
    depends_on:
      scorpio:
        condition: service_healthy
    environment:
      MICRONAUT_SERVER_PORT: 8080
      ENDPOINTS_ALL_PORT: 9090
      MICRONAUT_METRICS_ENABLED: "true"
      ENDPOINTS_HEALTH_ENABLED: "true"
      LOGGER_LEVELS_ROOT: ${TMFORUM_LOG_LEVEL:-INFO}
      MICRONAUT_HTTP_SERVICES_NGSI_URL: http://scorpio:9090
      MICRONAUT_HTTP_SERVICES_NGSI_PATH: ngsi-ld/v1
      GENERAL_BASEPATH: /tmf-api/partyManagement/v4
      GENERAL_CONTEXT_URL: https://uri.etsi.org/ngsi-ld/v1/ngsi-ld-core-context.jsonld
      GENERAL_SERVER_HOST: ${EXTERNAL_DOMAIN_PROTOCOL:-https}://${EXTERNAL_DOMAIN}
      MAPPING_STRICT_RELATIONSHIPS: "false"
      API_EXTENSION_ENABLED: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9090/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    <<: *common-options

  # TMF622 - Product Ordering Management
  tmforum-product-ordering:
    image: ${TMFORUM_PRODUCT_ORDERING_IMAGE:-quay.io/fiware/tmforum-product-ordering-management:0.25.1}
    restart: unless-stopped
    networks:
      default:
        aliases:
          - tmforum-product-ordering
    depends_on:
      scorpio:
        condition: service_healthy
    environment:
      MICRONAUT_SERVER_PORT: 8080
      ENDPOINTS_ALL_PORT: 9090
      MICRONAUT_METRICS_ENABLED: "true"
      ENDPOINTS_HEALTH_ENABLED: "true"
      LOGGER_LEVELS_ROOT: ${TMFORUM_LOG_LEVEL:-INFO}
      MICRONAUT_HTTP_SERVICES_NGSI_URL: http://scorpio:9090
      MICRONAUT_HTTP_SERVICES_NGSI_PATH: ngsi-ld/v1
      GENERAL_BASEPATH: /tmf-api/productOrderingManagement/v4
      GENERAL_CONTEXT_URL: https://uri.etsi.org/ngsi-ld/v1/ngsi-ld-core-context.jsonld
      GENERAL_SERVER_HOST: ${EXTERNAL_DOMAIN_PROTOCOL:-https}://${EXTERNAL_DOMAIN}
      MAPPING_STRICT_RELATIONSHIPS: "false"
      API_EXTENSION_ENABLED: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9090/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    <<: *common-options

  # TMF633 - Service Catalog Management
  tmforum-service-catalog:
    image: ${TMFORUM_SERVICE_CATALOG_IMAGE:-quay.io/fiware/tmforum-service-catalog:0.25.1}
    restart: unless-stopped
    networks:
      default:
        aliases:
          - tmforum-service-catalog
    depends_on:
      scorpio:
        condition: service_healthy
    environment:
      MICRONAUT_SERVER_PORT: 8080
      ENDPOINTS_ALL_PORT: 9090
      MICRONAUT_METRICS_ENABLED: "true"
      ENDPOINTS_HEALTH_ENABLED: "true"
      LOGGER_LEVELS_ROOT: ${TMFORUM_LOG_LEVEL:-INFO}
      MICRONAUT_HTTP_SERVICES_NGSI_URL: http://scorpio:9090
      MICRONAUT_HTTP_SERVICES_NGSI_PATH: ngsi-ld/v1
      GENERAL_BASEPATH: /tmf-api/serviceCatalogManagement/v4
      GENERAL_CONTEXT_URL: https://uri.etsi.org/ngsi-ld/v1/ngsi-ld-core-context.jsonld
      GENERAL_SERVER_HOST: ${EXTERNAL_DOMAIN_PROTOCOL:-https}://${EXTERNAL_DOMAIN}
      MAPPING_STRICT_RELATIONSHIPS: "false"
      API_EXTENSION_ENABLED: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9090/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    <<: *common-options

  # ============================================================================
  # Nginx Reverse Proxy - TMForum API Gateway
  # ============================================================================
  tmforum-proxy:
    image: nginx:1.25-alpine
    restart: unless-stopped
    networks:
      default:
        aliases:
          - tmforum-nginx
          - tmforum-proxy
          - tmforum-gateway
    depends_on:
      tmforum-product-catalog:
        condition: service_healthy
      tmforum-party-catalog:
        condition: service_healthy
      tmforum-product-ordering:
        condition: service_healthy
      tmforum-service-catalog:
        condition: service_healthy
    volumes:
      - ../shared/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    <<: *common-options

# Networks
networks:
  default:
