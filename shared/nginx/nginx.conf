# Nginx reverse proxy configuration for DOME TMForum APIs
# Routes all TMForum API requests to appropriate backend services

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/json;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml application/atom+xml image/svg+xml
               text/x-component application/x-font-ttf font/opentype;

    # Upstream definitions for TMForum APIs
    upstream tmforum-product-catalog {
        server tmforum-product-catalog:8080;
    }

    upstream tmforum-party-catalog {
        server tmforum-party-catalog:8080;
    }

    upstream tmforum-product-ordering {
        server tmforum-product-ordering:8080;
    }

    upstream tmforum-service-catalog {
        server tmforum-service-catalog:8080;
    }

    # Main server block
    server {
        listen 8080;
        server_name localhost;

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # TMF620 - Product Catalog Management API
        location /tmf-api/productCatalogManagement/ {
            proxy_pass http://tmforum-product-catalog/tmf-api/productCatalogManagement/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # CORS headers
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, Accept" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # TMF632 - Party Management API
        location /tmf-api/partyManagement/ {
            proxy_pass http://tmforum-party-catalog/tmf-api/partyManagement/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # CORS headers
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, Accept" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # TMF622 - Product Ordering Management API
        location /tmf-api/productOrderingManagement/ {
            proxy_pass http://tmforum-product-ordering/tmf-api/productOrderingManagement/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # CORS headers
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, Accept" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # TMF633 - Service Catalog Management API
        location /tmf-api/serviceCatalogManagement/ {
            proxy_pass http://tmforum-service-catalog/tmf-api/serviceCatalogManagement/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # CORS headers
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, Accept" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # Default location - return info about available APIs
        location / {
            default_type application/json;
            return 200 '{
  "name": "DOME TMForum API Gateway",
  "description": "Reverse proxy for TMForum APIs",
  "available_apis": [
    {
      "name": "TMF620 - Product Catalog Management",
      "path": "/tmf-api/productCatalogManagement/v4",
      "endpoints": [
        "/catalog",
        "/category",
        "/productOffering",
        "/productSpecification"
      ]
    },
    {
      "name": "TMF632 - Party Management",
      "path": "/tmf-api/partyManagement/v4",
      "endpoints": [
        "/organization",
        "/individual"
      ]
    },
    {
      "name": "TMF622 - Product Ordering Management",
      "path": "/tmf-api/productOrderingManagement/v4",
      "endpoints": [
        "/productOrder"
      ]
    },
    {
      "name": "TMF633 - Service Catalog Management",
      "path": "/tmf-api/serviceCatalogManagement/v4",
      "endpoints": [
        "/serviceCatalog",
        "/serviceSpecification"
      ]
    }
  ],
  "health_check": "/health"
}';
        }

        # Error pages
        error_page 502 503 504 @error_backend;
        location @error_backend {
            default_type application/json;
            return 503 '{"error": "Backend service unavailable", "status": 503}';
        }
    }
}
