    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - access-node




  # --- CORE & DLT ---
  # These services handle data replication and DLT synchronization.

  desmos:
    # Service: DESMOS
    # Purpose: Manages replication of data across nodes in the DOME ecosystem.
    # Internal Ports: 8080 (API)
    image: in2workspace/in2-desmos-api:v2.0.3
    container_name: desmos
    restart: always
    depends_on:
      - postgres
      - scorpio
      - dlt-adapter-alastria
    labels:
      - "dome.name=desmos"
      - "dome.description=Manages replication of data across nodes"
      - "dome.owner=Altia"
      - "dome.type=service"
      - "dome.lifecycle=sandbox"
      - "dome.dependsOn=component:postgres,component:scorpio,component:dlt-adapter-alastria"
      - "dome.versions=postgres:any,scorpio:any,dlt-adapter-alastria:any"
    # ports:
    #   - "8080:8080"
    environment:
      # Application Configuration
      API_VERSION: v2
      SERVER_PORT: 8080

      # Logging Configuration
      LOGGING_LEVEL_ROOT: INFO
      LOGGING_LEVEL_ES_IN2_DESMOS: INFO
      
      # Database Configuration
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: desmos
      DB_HOST: postgres
      DB_PORT: 5432
      SPRING_R2DBC_URL: r2dbc:postgresql://postgres:5432/desmos
      SPRING_R2DBC_USERNAME: postgres
      SPRING_R2DBC_PASSWORD: postgres
      SPRING_FLYWAY_URL: jdbc:postgresql://postgres:5432/desmos
      
      # Context Broker Configuration
      BROKER_PROVIDER: scorpio
      BROKER_EXTERNAL_DOMAIN: http://scorpio:9090
      BROKER_INTERNAL_DOMAIN: http://scorpio:9090
      
      # DLT Adapter Configuration
      DLT_ADAPTER_PROVIDER: digitelts
      DLT_ADAPTER_INTERNAL_DOMAIN: http://dlt-adapter-alastria:8080
      DLT_ADAPTER_EXTERNAL_DOMAIN: http://dlt-adapter-alastria:8080
    env_file:
      - .env.desmos
    networks:
      - access-node
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 40s

  dlt-adapter-alastria:
    # Service: DLT Adapter Alastria
    # Purpose: Interface for Alastria DLT.
    # Internal Ports: 8080 (API)
    image: quay.io/digitelts/dlt-adapter:1.5.1
    container_name: dlt-adapter-alastria
    restart: always
    labels:
      - "dome.name=dlt-adapter-alastria"
      - "dome.description=Interface for Alastria DLT"
      - "dome.owner=DigitelTS"
      - "dome.type=service"
      - "dome.lifecycle=sandbox"
      - "dome.dependsOn="
      - "dome.versions="
    # ports:
    #   - "8080:8080"
    env_file:
      - .env.dlt-adapter-alastria
    networks:
      - access-node

  scorpio:
    # Service: Scorpio Broker
    # Purpose: Context Broker for NGSI-LD data.
    # Internal Ports: 9090
    image: scorpiobroker/all-in-one-runner:java-4.1.10
    container_name: scorpio
    restart: always
    depends_on:
      - postgres
    labels:
      - "dome.name=scorpio"
      - "dome.description=NGSI-LD Context Broker"
      - "dome.owner=Elliot"
      - "dome.type=service"
      - "dome.lifecycle=sandbox"
      - "dome.dependsOn=component:postgres"
      - "dome.versions=postgres:any"
    ports:
      - "9090:9090"
    env_file:
      - .env.scorpio
    networks:
      - access-node

  postgres:
    # Service: PostgreSQL Database
    image: postgis/postgis:15-3.4
    container_name: postgres
    restart: always
    labels:
      - "dome.name=postgres"
      - "dome.description=PostgreSQL with PostGIS extension"
      - "dome.owner=Elliot"
      - "dome.type=database"
      - "dome.lifecycle=sandbox"
      - "dome.versions=any"
    env_file:
      - .env.postgres
    volumes:
      - ${POSTGRES_DATA_PATH:-pgdata}:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - access-node

  # --- API Gateway & Entry Point ---
  # This service is the SINGLE ENTRY POINT to the entire Access Node stack.
  # All external traffic MUST pass through this proxy.

  caddy:
    # Service: Caddy API Gateway
    # Purpose: Single entry point for all external traffic entering Access Node.
    # Ports: 80 (HTTP exposed), 443 (HTTPS)
    image: caddy:2-alpine
    container_name: caddy
    restart: always
    ports:
      - "80:80"
      # - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    labels:
      - "dome.name=caddy"
      - "dome.description=API Gateway and Reverse Proxy for Access Node"
      - "dome.owner=Altia"
      - "dome.type=proxy"
      - "dome.lifecycle=sandbox"
      - "dome.dependsOn=component:account,component:agreement,component:customer-bill-management,component:customer-management,component:party-catalog,component:party-role,component:product-catalog,component:product-inventory,component:product-ordering-management,component:quote,component:resource-catalog,component:resource-function-activation,component:resource-inventory,component:service-catalog,component:service-inventory,component:usage-management,component:desmos"
      - "dome.versions=any"
    networks:
      - access-node

networks:
  access-node:
    name: access-node

volumes:
  caddy_data:
  caddy_config:
  pgdata:
  minio-data:

