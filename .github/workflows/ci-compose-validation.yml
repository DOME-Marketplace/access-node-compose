name: CI - Docker Compose Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-compose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env files from examples
        run: |
          for f in $(find . -name "*.example" -not -path "./.git/*"); do
            cp "$f" "${f%.example}"
          done
      
      - name: Validate Docker Compose file
        run: docker compose -f compose.yaml config
      - name: Check required metadata labels
        run: |
          python3 .github/scripts/check_labels.py compose.yaml
        continue-on-error: false
